name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (cix)
        - API Server
        - File Watcher
        - Indexing
        - Docker / CUDA
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cix init`
        2. Run `cix search "..."`
        3. See error
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Local (native)
        - Docker (CPU)
        - CUDA (NVIDIA GPU)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
    validations:
      required: false