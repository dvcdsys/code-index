name: CI — Go server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci-go.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci-go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: go build ./...
