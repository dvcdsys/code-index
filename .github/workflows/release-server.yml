name: "Release: Server"

# Triggered by server-namespaced tags (e.g. `server/v0.3.0`).
# Builds CPU (multi-arch) and CUDA (amd64-only) Docker images and
# publishes them to Docker Hub, then creates the GitHub release.
on:
  push:
    tags:
      - "server/v*"

permissions:
  contents: write

jobs:
  docker-cpu:
    name: Build CPU image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#server/}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.ver.outputs.version }}
          tags: |
            dvcdsys/code-index:${{ steps.ver.outputs.version }}
            dvcdsys/code-index:latest

  docker-cuda:
    name: Build CUDA image (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#server/}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile.cuda
          platforms: linux/amd64
          push: true
          build-args: VERSION=${{ steps.ver.outputs.version }}
          tags: |
            dvcdsys/code-index:${{ steps.ver.outputs.version }}-cu128
            dvcdsys/code-index:cu128

  release:
    name: Publish release
    needs: [docker-cpu, docker-cuda]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#server/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Server ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Docker Images

            | Tag | Image |
            |---|---|
            | CPU (multi-arch) | `dvcdsys/code-index:${{ steps.ver.outputs.version }}` |
            | CUDA 12.8 | `dvcdsys/code-index:${{ steps.ver.outputs.version }}-cu128` |

            See [doc/MIGRATION_FROM_PYTHON.md](doc/MIGRATION_FROM_PYTHON.md) if upgrading from the Python backend.
