name: "Release: Server"

# Triggered by server-namespaced tags (e.g. `server/v0.3.0`).
# Builds CPU (multi-arch) and CUDA (amd64-only) Docker images and
# publishes them to Docker Hub, then creates the GitHub release.
#
# `workflow_dispatch` allows rebuilding an existing released version
# without cutting a new tag (e.g. to refresh attestations or pick up
# a new base image). The GitHub release step is skipped on dispatch.
on:
  push:
    tags:
      - "server/v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag like `server/v0.4.0` or a SHA)"
        required: true
        type: string
      version:
        description: "Version string for image tags (e.g. `v0.4.0`)"
        required: true
        type: string
      update_floating_tags:
        description: "Also push `:latest` and `:cu128` floating tags"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  docker-cpu:
    name: Build CPU image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "floating=${{ github.event.inputs.update_floating_tags }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#server/}" >> "$GITHUB_OUTPUT"
            echo "floating=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose tags
        id: tags
        run: |
          tags="dvcdsys/code-index:${{ steps.ver.outputs.version }}"
          if [ "${{ steps.ver.outputs.floating }}" = "true" ]; then
            tags="$tags
          dvcdsys/code-index:latest"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          build-args: VERSION=${{ steps.ver.outputs.version }}
          # `openapi=doc` mounts the repo-root doc/ folder so the dashboard
          # build stage can `COPY --from=openapi openapi.yaml` without us
          # widening the primary build context (which is `server/`).
          build-contexts: |
            openapi=doc
          tags: ${{ steps.tags.outputs.tags }}

  docker-cuda:
    name: Build CUDA image (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "floating=${{ github.event.inputs.update_floating_tags }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#server/}" >> "$GITHUB_OUTPUT"
            echo "floating=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose tags
        id: tags
        run: |
          tags="dvcdsys/code-index:${{ steps.ver.outputs.version }}-cu128"
          if [ "${{ steps.ver.outputs.floating }}" = "true" ]; then
            tags="$tags
          dvcdsys/code-index:cu128"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile.cuda
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          build-args: VERSION=${{ steps.ver.outputs.version }}
          # `openapi=doc` mounts the repo-root doc/ folder so the dashboard
          # build stage can `COPY --from=openapi openapi.yaml` without us
          # widening the primary build context (which is `server/`).
          build-contexts: |
            openapi=doc
          tags: ${{ steps.tags.outputs.tags }}

  release:
    name: Publish release
    needs: [docker-cpu, docker-cuda]
    runs-on: ubuntu-latest
    # Skip GitHub release creation on manual rebuilds — the release
    # already exists for the version being rebuilt.
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#server/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Server ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Docker Images

            | Tag | Image |
            |---|---|
            | CPU (multi-arch) | `dvcdsys/code-index:${{ steps.ver.outputs.version }}` |
            | CUDA 12.8 | `dvcdsys/code-index:${{ steps.ver.outputs.version }}-cu128` |

            See [doc/MIGRATION_FROM_PYTHON.md](doc/MIGRATION_FROM_PYTHON.md) if upgrading from the Python backend.
