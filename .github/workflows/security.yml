name: "Security"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 06:00 UTC

permissions:
  contents: read
  security-events: write  # required for SARIF upload to the Security tab

jobs:
  govulncheck:
    name: govulncheck (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          # server/bench is a Phase 0 PoC module (chromem + tree-sitter
          # benchmarks). It pins an old golang.org/x/net via its own
          # go.mod + replace directive and is never shipped in the
          # cix-server binary, so it stays out of the prod CVE gate.
          skip-dirs: server/bench
          scanners: vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
